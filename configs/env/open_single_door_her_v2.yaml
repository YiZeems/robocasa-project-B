env:
  task: OpenCabinet
  robots: PandaOmron
  controller: null
  use_gym_wrapper: false
  horizon: 500
  control_freq: 20

  reward_shaping: true
  use_object_obs: true
  use_camera_obs: false

  has_renderer: false
  has_offscreen_renderer: false
  render_camera: robot0_agentview_center
  camera_names:
    - robot0_agentview_center
  camera_height: 128
  camera_width: 128
  obj_registries:
    - lightwheel

  ignore_done: false

  # Tight spawn: robot close to the handle
  robot_spawn_deviation_pos_x: 0.05
  robot_spawn_deviation_pos_y: 0.02

  use_her: true

reward:
  # Dense shaping re-enabled to guide exploration toward the handle.
  # compute_reward (sparse -1/0) handles virtual HER relabeling separately.
  w_approach: 0.3
  w_progress: 1.0
  w_success: 0.0      # HER sparse handles this
  w_action_reg: 0.01
  w_stagnation: 0.02
  w_wrong_dir: 0.02
  w_oscillation: 0.01

  # Low threshold: HER can create goals even for tiny door openings
  theta_success: 0.10

  d_max: 0.6
  d_prox: 0.12
  stagnation_n: 50
  tol_wrong_dir: 0.02
  oscillation_window: 20
  oscillation_threshold: 4
