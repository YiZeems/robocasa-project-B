project:
  name: robocasa_telecom
  task: OpenCabinet

paths:
  output_root: outputs
  checkpoint_root: checkpoints
  tensorboard_root: logs/tensorboard

env:
  config_path: configs/env/open_single_door.yaml

train:
  algorithm: PPO
  policy: MlpPolicy
  device: auto          # "auto" = CUDA si disponible, CPU sinon.

  # --- Parallelism (conservative — use if 8-env config crashes) ---
  # If SubprocVecEnv fails with BrokenPipeError / EOFError / "Could not allocate memory",
  # drop to this config. 6 envs is safe on Windows with RoboCasa even on low RAM.
  n_envs: 6
  vec_env_cls: subproc

  # --- Steps / budget ---
  # Total transitions per PPO update = n_steps * n_envs = 256 * 6 = 1536
  total_timesteps: 1000000
  n_steps: 256          # per env

  # --- PPO hyperparams ---
  batch_size: 384       # must divide n_steps * n_envs = 1536 evenly → 4 minibatches
  n_epochs: 4
  learning_rate: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  ent_coef: 0.01
  vf_coef: 0.5
  clip_range: 0.2

  # --- Logging / checkpoints ---
  seed: 0
  save_freq_steps: 50000
  eval_episodes: 20
