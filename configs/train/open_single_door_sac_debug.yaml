project:
  name: robocasa_telecom
  task: OpenCabinet

paths:
  output_root: outputs
  checkpoint_root: checkpoints
  tensorboard_root: logs/tensorboard

env:
  config_path: configs/env/open_single_door.yaml

train:
  algorithm: SAC
  policy: MlpPolicy
  total_timesteps: 300000

  learning_rate: 3.0e-4
  buffer_size: 200000
  batch_size: 256
  learning_starts: 5000
  tau: 0.005
  gamma: 0.99
  train_freq: 1
  gradient_steps: 1
  ent_coef: auto
  target_update_interval: 1
  net_arch: [256, 256]

  seed: 0
  save_freq_steps: 50000
  eval_episodes: 5
  device: auto

eval:
  eval_freq: 25000
  n_eval_episodes: 10
  validation_seed: 10000
  test_seed: 20000
  early_stopping_patience: 0
  deterministic: true
