project:
  name: robocasa_telecom
  task: OpenCabinet

paths:
  output_root: outputs
  checkpoint_root: checkpoints
  tensorboard_root: logs/tensorboard

env:
  config_path: configs/env/open_single_door.yaml

train:
  algorithm: A2C
  policy: MlpPolicy
  total_timesteps: 200000
  learning_rate: 0.0007
  n_steps: 5            # A2C uses much shorter rollouts than PPO
  gamma: 0.99
  gae_lambda: 1.0
  ent_coef: 0.0
  vf_coef: 0.5
  seed: 0
  save_freq_steps: 50000
  eval_episodes: 5
  device: auto
