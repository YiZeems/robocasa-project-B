project:
  name: robocasa_telecom
  task: OpenCabinet

paths:
  output_root: outputs
  checkpoint_root: checkpoints
  tensorboard_root: logs/tensorboard

env:
  config_path: configs/env/open_single_door_her.yaml

train:
  algorithm: SAC
  policy: MultiInputPolicy
  total_timesteps: 3000000

  learning_rate: 3.0e-4
  lr_schedule: cosine
  lr_min: 1.0e-5

  buffer_size: 1000000
  batch_size: 512
  learning_starts: 10000

  tau: 0.01
  gamma: 0.99
  train_freq: 1
  gradient_steps: 4
  target_update_interval: 1

  ent_coef: 0.1
  use_sde: true
  sde_sample_freq: 64

  net_arch: [400, 300]

  # HER configuration
  use_her: true
  her_n_sampled_goal: 4        # 4 virtual goals per real transition
  her_goal_strategy: future    # sample from future states in same episode

  n_envs: 12
  seed: 0
  save_freq_steps: 100000
  eval_episodes: 5
  device: auto

eval:
  eval_freq: 100000
  n_eval_episodes: 10
  validation_seed: 10000
  test_seed: 20000
  early_stopping_patience: 20
  deterministic: true
