project:
  name: robocasa_telecom
  task: OpenCabinet

paths:
  output_root: outputs
  checkpoint_root: checkpoints
  tensorboard_root: logs/tensorboard

env:
  config_path: configs/env/open_single_door.yaml

train:
  algorithm: SAC
  policy: MlpPolicy
  total_timesteps: 200000
  learning_rate: 0.0003
  buffer_size: 100000
  batch_size: 256
  tau: 0.005
  gamma: 0.99
  ent_coef: auto        # SAC auto-tunes entropy coefficient
  train_freq: 1
  gradient_steps: 1
  learning_starts: 1000  # steps before first gradient update
  seed: 0
  save_freq_steps: 50000
  eval_episodes: 5
  device: auto
