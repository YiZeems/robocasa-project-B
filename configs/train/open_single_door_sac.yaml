project:
  name: robocasa_telecom
  task: OpenCabinet

paths:
  output_root: outputs
  checkpoint_root: checkpoints
  tensorboard_root: logs/tensorboard

env:
  config_path: configs/env/open_single_door.yaml

train:
  algorithm: SAC
  policy: MlpPolicy
  total_timesteps: 3000000

  learning_rate: 3.0e-4
  buffer_size: 1000000
  batch_size: 512
  learning_starts: 1000
  tau: 0.005
  gamma: 0.99
  train_freq: 1
  gradient_steps: 12
  ent_coef: auto
  target_update_interval: 1
  net_arch: [256, 256]

  n_envs: 12
  seed: 0
  save_freq_steps: 100000
  eval_episodes: 5
  device: mps

eval:
  eval_freq: 25000
  n_eval_episodes: 50
  validation_seed: 10000
  test_seed: 20000
  early_stopping_patience: 20
  deterministic: true
