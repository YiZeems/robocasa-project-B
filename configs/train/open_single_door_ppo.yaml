project:
  name: robocasa_telecom
  task: OpenCabinet

paths:
  output_root: outputs
  checkpoint_root: checkpoints
  tensorboard_root: logs/tensorboard

env:
  config_path: configs/env/open_single_door.yaml

train:
  algorithm: PPO
  policy: MlpPolicy
  total_timesteps: 200000
  n_steps: 2048
  batch_size: 256
  learning_rate: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  ent_coef: 0.0
  vf_coef: 0.5
  clip_range: 0.2
  n_epochs: 10
  n_envs: 4
  seed: 0
  save_freq_steps: 50000
  eval_episodes: 5
  device: auto   # resolved to cuda > mps > cpu by utils/device.resolve_device

eval:
  eval_freq: 0
  n_eval_episodes: 10
  validation_seed: 10000
  test_seed: 20000
  early_stopping_patience: 0
  deterministic: true
