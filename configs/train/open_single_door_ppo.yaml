project:
  name: robocasa_telecom
  task: OpenCabinet

paths:
  output_root: outputs
  checkpoint_root: checkpoints
  tensorboard_root: logs/tensorboard

env:
  config_path: configs/env/open_single_door.yaml

train:
  algorithm: PPO
  policy: MlpPolicy
  total_timesteps: 200000
  n_steps: 2048
  batch_size: 256
  learning_rate: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  ent_coef: 0.0
  vf_coef: 0.5
  clip_range: 0.2
  n_epochs: 10
  seed: 0
  save_freq_steps: 50000
  eval_episodes: 5
  device: auto
