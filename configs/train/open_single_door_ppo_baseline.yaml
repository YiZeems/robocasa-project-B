project:
  name: robocasa_telecom
  task: OpenCabinet

paths:
  output_root: outputs
  checkpoint_root: checkpoints
  tensorboard_root: logs/tensorboard

env:
  config_path: configs/env/open_single_door.yaml

train:
  algorithm: PPO
  policy: MlpPolicy
  total_timesteps: 5000000

  learning_rate: 3.0e-4
  n_steps: 1024
  batch_size: 256
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  net_arch: [256, 256]

  seed: 0
  save_freq_steps: 100000
  eval_episodes: 5
  device: auto

eval:
  eval_freq: 25000
  n_eval_episodes: 50
  validation_seed: 10000
  test_seed: 20000
  early_stopping_patience: 20
  deterministic: true
