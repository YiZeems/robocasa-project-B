name: RoboCasa Telecom CI

on:
  push:
    branches:
      - main
      - develop
      - feature/**
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  quick-linux:
    name: Quick Linux Validation
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-variant: Miniforge3
          miniforge-version: latest
          python-version: "3.11"
          activate-environment: base
          auto-activate-base: true

      - name: Bootstrap project environment (no heavy assets)
        shell: bash -l {0}
        run: |
          ENV_NAME=robocasa_telecom \
          DOWNLOAD_ASSETS=0 \
          DOWNLOAD_DATASETS=0 \
          RUN_SETUP_MACROS=0 \
          VERIFY_ASSETS=0 \
          bash scripts/setup_conda.sh

      - name: Validate shell scripts
        shell: bash -l {0}
        run: |
          bash -n scripts/setup_conda.sh \
            scripts/run_train.sh \
            scripts/run_eval.sh \
            scripts/slurm/train_array.sbatch \
            scripts/slurm/eval.sbatch

      - name: Compile Python modules
        shell: bash -l {0}
        run: |
          conda run -n robocasa_telecom python -m compileall robocasa_telecom scripts tests

      - name: Config loading smoke test
        shell: bash -l {0}
        run: |
          conda run -n robocasa_telecom python tests/test_config_loading.py

      - name: Validate explicit missing-assets error path
        shell: bash -l {0}
        run: |
          set +e
          output=$(cd /tmp && conda run -n robocasa_telecom python -m robocasa_telecom.sanity --config configs/env/open_single_door.yaml --steps 2 2>&1)
          status=$?
          set -e

          # Without assets, sanity must fail with an explicit and actionable message.
          if [ "$status" -eq 0 ]; then
            echo "Unexpected success: sanity should fail when assets are not downloaded."
            exit 1
          fi

          echo "$output" | grep -q "RoboCasa assets are missing"

  full-assets-linux:
    name: Full Asset Runtime Smoke (manual)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-variant: Miniforge3
          miniforge-version: latest
          python-version: "3.11"
          activate-environment: base
          auto-activate-base: true

      - name: Bootstrap with assets (slow)
        shell: bash -l {0}
        run: |
          ENV_NAME=robocasa_telecom \
          DOWNLOAD_ASSETS=1 \
          DOWNLOAD_DATASETS=0 \
          RUN_SETUP_MACROS=1 \
          VERIFY_ASSETS=1 \
          bash scripts/setup_conda.sh

      - name: Runtime sanity with assets
        shell: bash -l {0}
        run: |
          conda run -n robocasa_telecom python -m robocasa_telecom.sanity --config configs/env/open_single_door.yaml --steps 5
